<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <radialGradient id="g1" cx="88%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0A0908" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="8%" cy="88%" r="40%">
      <stop offset="0%" stop-color="#1A1814" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0A0908" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cM">
      <rect x="0" y="70" width="590" height="122"/>
    </clipPath>
    <clipPath id="cC">
      <rect x="0" y="188" width="590" height="122"/>
    </clipPath>
  </defs>

  <style>
    @keyframes revealUp {
      from { transform: translateY(130px); }
      to   { transform: translateY(0px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes dotPulse {
      0%,100% { r: 4.5; opacity: 1; }
      50%     { r: 6.5; opacity: 0.55; }
    }
    @keyframes haloPulse {
      0%,100% { r: 11; opacity: 0.13; }
      50%     { r: 15; opacity: 0.04; }
    }
    .ew  { animation: fadeUp    0.65s cubic-bezier(0.16,1,0.3,1) 0.05s both; }
    .nm  { animation: revealUp  1.1s  cubic-bezier(0.16,1,0.3,1) 0.18s both; }
    .nc  { animation: revealUp  1.1s  cubic-bezier(0.16,1,0.3,1) 0.31s both; }
    .sp  { animation: fadeIn    0.9s  ease                        0.65s both; }
    .sl  { animation: fadeUp    0.65s cubic-bezier(0.16,1,0.3,1) 0.60s both; }
    .fl  { animation: fadeIn    0.55s ease                        0.88s both; }
    .dh  { animation: haloPulse 2.8s  ease-in-out infinite; }
    .dc  { animation: dotPulse  2.8s  ease-in-out infinite; }
  </style>

  <!-- bg -->
  <rect width="900" height="340" fill="#0A0908"/>
  <rect width="900" height="340" fill="url(#g1)"/>
  <rect width="900" height="340" fill="url(#g2)"/>

  <!-- column divider -->
  <line x1="597" y1="24" x2="597" y2="314"
        stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- ── LEFT ── -->

  <!-- eyebrow -->
  <text class="ew" x="48" y="54"
    font-family="'Courier New',Courier,monospace"
    font-size="9.5" font-weight="400" letter-spacing="2.8"
    fill="#34322E">CS  ·  FINANCE  ·  PRODUCT  ·  MARKETING</text>

  <!-- MARK clip-reveal -->
  <g clip-path="url(#cM)">
    <text class="nm" x="42" y="178"
      font-family="-apple-system,'SF Pro Display','Helvetica Neue','Arial Black',sans-serif"
      font-size="114" font-weight="900" letter-spacing="-5"
      fill="#EEEBE3">MARK</text>
  </g>

  <!-- CHU clip-reveal -->
  <g clip-path="url(#cC)">
    <text class="nc" x="42" y="296"
      font-family="-apple-system,'SF Pro Display','Helvetica Neue','Arial Black',sans-serif"
      font-size="114" font-weight="900" letter-spacing="-5"
      fill="#EEEBE3">CHU</text>
  </g>

  <!-- ── RIGHT ── -->
  <g class="sp">
    <!-- section label -->
    <text x="621" y="52"
      font-family="'Courier New',Courier,monospace"
      font-size="8.5" font-weight="400" letter-spacing="2.8"
      fill="#34322E">PRINCIPLES</text>

    <!-- 01 -->
    <text x="621" y="96"  font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#D4A843">01</text>
    <text x="648" y="96"  font-family="'Courier New',Courier,monospace" font-size="11"  font-weight="700" letter-spacing="0.5" fill="#EEEBE3">INSIGHT</text>
    <text x="648" y="111" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">See through to the underlying</text>
    <text x="648" y="124" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">logic. The right question</text>
    <text x="648" y="137" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">matters more than a fast answer.</text>

    <!-- 02 -->
    <text x="621" y="165" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#D4A843">02</text>
    <text x="648" y="165" font-family="'Courier New',Courier,monospace" font-size="11"  font-weight="700" letter-spacing="0.5" fill="#EEEBE3">REALISM</text>
    <text x="648" y="180" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">Stay honest about what exists,</text>
    <text x="648" y="193" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">not what should.</text>

    <!-- 03 -->
    <text x="621" y="221" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#D4A843">03</text>
    <text x="648" y="221" font-family="'Courier New',Courier,monospace" font-size="11"  font-weight="700" letter-spacing="0.5" fill="#EEEBE3">COMPOUNDING</text>
    <text x="648" y="236" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">Build habits and systems that</text>
    <text x="648" y="249" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="#6B6760">accumulate value.</text>

    <!-- Monash badge -->
    <rect x="621" y="271" width="126" height="21" rx="3"
      fill="rgba(212,168,67,0.07)" stroke="rgba(212,168,67,0.2)" stroke-width="1"/>
    <text x="684" y="286" text-anchor="middle"
      font-family="'Courier New',Courier,monospace"
      font-size="9" font-weight="500" letter-spacing="1.8"
      fill="#D4A843">MONASH UNIV.</text>
  </g>

  <!-- ── BOTTOM BAR ── -->
  <line x1="48" y1="317" x2="852" y2="317"
        stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- live dot + status -->
  <g class="sl">
    <circle class="dh" cx="64" cy="329" r="11" fill="#00DC82"/>
    <circle class="dc" cx="64" cy="329" r="4.5" fill="#00DC82"/>
    <text x="79" y="333.5"
      font-family="'Courier New',Courier,monospace"
      font-size="10.5" font-weight="500"
      fill="#6B6760">Building deliberately</text>
  </g>

  <!-- portfolio link -->
  <g class="fl">
    <text x="580" y="333.5" text-anchor="end"
      font-family="'Courier New',Courier,monospace"
      font-size="10" letter-spacing="1.5"
      fill="#D4A843">markchu-git.github.io  ↗</text>
  </g>
</svg>
