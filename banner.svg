<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#0A0908"/>

  <!-- Ambient orb -->
  <radialGradient id="orb" cx="75%" cy="30%" r="45%">
    <stop offset="0%" stop-color="#D4A843" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#0A0908" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="320" fill="url(#orb)"/>

  <!-- Top border line -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
  <!-- Bottom border line -->
  <line x1="0" y1="319" x2="900" y2="319" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="56" y="72" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500"
        letter-spacing="3" text-transform="uppercase" fill="#34322E" text-anchor="start">
    CS  ·  FINANCE  ·  PRODUCT  ·  MARKETING
  </text>

  <!-- Name: MARK -->
  <text x="48" y="172" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="110" font-weight="900" letter-spacing="-5" fill="#EEEBE3">MARK</text>

  <!-- Name: CHU -->
  <text x="48" y="272" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="110" font-weight="900" letter-spacing="-5" fill="#EEEBE3">CHU</text>

  <!-- Live dot -->
  <circle cx="642" cy="256" r="4" fill="#00DC82"/>
  <circle cx="642" cy="256" r="7" fill="#00DC82" fill-opacity="0.12"/>

  <!-- Status text -->
  <text x="655" y="261" font-family="'JetBrains Mono', monospace" font-size="12"
        font-weight="500" fill="#6B6760">Building deliberately</text>

  <!-- Divider line -->
  <line x1="48" y1="290" x2="852" y2="290" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- Portfolio link -->
  <text x="48" y="311" font-family="'JetBrains Mono', monospace" font-size="10"
        letter-spacing="2" fill="#D4A843">markchu-git.github.io</text>

  <!-- Arrow -->
  <text x="206" y="311" font-family="'JetBrains Mono', monospace" font-size="10"
        fill="#D4A843">↗</text>
</svg>
